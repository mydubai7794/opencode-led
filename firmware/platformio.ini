[platformio]
default_envs = esp32, esp8266

[env]
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit NeoPixel@^1.12
src_filter = +<esp32/>

[env:esp8266]
platform = espressif8266
board = esp01_1m
framework = arduino
src_filter = +<esp8266/>
